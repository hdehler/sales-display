name: release

on:
  push:
    tags:
      - v*

env:
  GOVER: stable
  GOPRIVATE: github.com/slidehq/*

permissions:
  contents: write
  packages: write

jobs:
  release:
    strategy:
      fail-fast: false
      matrix:
        os: [ linux-self-hosted ]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Fetch tags
        run: git fetch --force --tags

      - name: Setup Go
        uses: actions/setup-go@v4
        with:
          go-version: ${{ env.GOVER }}
          cache: false # this is supposed to speed up the post setup go action.

      - name: Configure GitHub Secrets
        run: git config --global url.https://${{ secrets.GH_ACCESS_TOKEN }}@github.com/.insteadOf https://github.com/

      - name: Download Go dependencies
        run: go get -v -t -d ./...

      - name: Build and publish
        uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: latest
          args: release --clean
        env:
          PKGMAN_INTERNAL_UPLOAD_KEY_PROD: ${{ secrets.PKGMAN_INTERNAL_UPLOAD_KEY_PROD }}
          PKGMAN_INTERNAL_UPLOAD_KEY_STAGE: ${{ secrets.PKGMAN_INTERNAL_UPLOAD_KEY_STAGE }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
